baseURL = "https://obaida.ai/"
title = "Abu Obaida's Blog"
paginate = 10
theme = "PaperMod"
defaultContentLanguage = "en"

[params]
  author = "Abu Obaida"
  description = "Thoughts on tech, projects, and life by Abu Obaida."
  #profileMode = true
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = false

  [params.profileMode]
    enabled = true
    title = "Abu Obaida"
    subtitle = "Welcome to my blog — writing about tech, projects, and more."
    imageUrl = "/images/obaida-profile.jpeg"
    imageTitle = "Abu Obaida"
    imageWidth = 120
    imageHeight = 120

  [params.homeInfoParams]
    Title = "Abu Obaida's Blog"
    Content = "Welcome! I write about tech, projects, and ideas."

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/summonersrift"

[menu]
  [[menu.main]]
    identifier = "home"
    name = "Home"
    url = "/"
    weight = 10
  [[menu.main]]
    identifier = "posts"
    name = "Blog"
    url = "/posts/"
    weight = 20
  [[menu.main]]
    identifier = "projects"
    name = "Projects"
    url = "/projects/"
    weight = 30
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 40

[taxonomies]
  tag = "tags"
  category = "categories"
