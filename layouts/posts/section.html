{{- define "main" }}
<div class="post-list">
  {{- range .Pages }}
  <article class="post-card">
    <div class="post-thumbnail">
      {{- if .Params.thumbnail }}
      <a href="{{ .Permalink }}">
        <img src="{{ .Params.thumbnail }}" alt="{{ .Title }} thumbnail" loading="lazy">
      </a>
      {{- end }}
    </div>
    <div class="post-info">
      <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
      <time datetime="{{ .Date.Format "2006-01-02" }}">
        {{ .Date.Format "January 2, 2006" }}
      </time>
      <p class="post-excerpt">{{ .Summary }}</p>
      <a class="read-more" href="{{ .Permalink }}">Read more →</a>
    </div>
  </article>
  {{- end }}
</div>
{{- end }}
